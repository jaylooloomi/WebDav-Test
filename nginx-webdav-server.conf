# Nginx 反向代理 WebDAV 設定
# 将此内容放到 nginx.conf 的 http 区块中
# 或作为单独的 server.conf 包含到主配置

upstream webdav_backend {
    server localhost:8081;
    keepalive 32;
}

server {
    listen 88;
    server_name localhost 192.168.2.76;
    
    client_max_body_size 100M;  # 允许大型Office文件
    
    location /WebDav/ {
        # 基本反向代理
        proxy_pass http://webdav_backend/;
        proxy_http_version 1.1;
        
        # 连接保活（WebDAV 需要持久连接）
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        
        # 传递必要的 WebDAV 头
        proxy_pass_header Authorization;
        proxy_pass_header Depth;
        proxy_pass_header Destination;
        proxy_pass_header If;
        proxy_pass_header If-Match;
        proxy_pass_header If-Modified-Since;
        proxy_pass_header If-None-Match;
        proxy_pass_header If-Range;
        proxy_pass_header If-Unmodified-Since;
        proxy_pass_header Lock-Token;
        proxy_pass_header Overwrite;
        proxy_pass_header Translate;
        proxy_pass_header Content-Range;
        
        # 允许 WebDAV 方法
        proxy_method GET HEAD POST PUT DELETE OPTIONS PROPFIND PROPPATCH MKCOL COPY MOVE LOCK UNLOCK;
        
        # 主机和基本头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 重要：保留原始请求大小信息
        proxy_set_header Content-Length $content_length;
        
        # 禁用缓冲以支持大文件
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 超时设置（WebDAV LOCK 可能需要较长连接时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

